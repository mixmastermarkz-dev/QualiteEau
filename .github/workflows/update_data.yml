name: Mise à jour quotidienne des données

on:
  schedule:
    - cron: '30 9 * * *'  # 09h30 UTC = 11h30 Paris (été/UTC+2) — 10h30 Paris (hiver/UTC+1)
  workflow_dispatch:        # Déclenchement manuel depuis GitHub

permissions:
  contents: write           # Nécessaire pour git push

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Récupérer les données API
        run: python data_fetcher.py

      - name: Générer les pages communes
        run: python generate_pages.py

      - name: Publier les fichiers mis à jour
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add full_data.json sitemap.xml eau-potable/
          git diff --staged --quiet || git commit -m "data: mise à jour automatique $(TZ='Europe/Paris' date +'%d/%m/%Y à %H:%M')"
          git pull --rebase origin master
          git push
