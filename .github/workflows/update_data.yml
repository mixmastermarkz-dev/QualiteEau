name: Mise à jour quotidienne des données

on:
  schedule:
    - cron: '0 5 * * *'   # Tous les jours à 5h UTC (7h heure française)
  workflow_dispatch:        # Déclenchement manuel depuis GitHub

permissions:
  contents: write           # Nécessaire pour git push

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Récupérer le code
        uses: actions/checkout@v4

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Lancer le script de données
        run: python data_fetcher.py

      - name: Publier le nouveau full_data.json
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add full_data.json
          git diff --staged --quiet || git commit -m "data: mise à jour automatique $(date +'%d/%m/%Y à %H:%M')"
          git push
